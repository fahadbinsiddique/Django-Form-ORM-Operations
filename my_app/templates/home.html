{% extends 'masters/base.html' %} {% block blockname %}
<h1>Welcome to My <span style="font-size: 50px; color: green">Home Page</span></h1>
<div class="form-container">
  <h2>Student Registration</h2>

  <form action="" method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="student_name" placeholder="Enter full name" required />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="student_email" placeholder="example@mail.com" required />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="student_phone" placeholder="017XXXXXXXX" required />
    </div>

    <div class="form-group">
      <label for="address">Residential Address</label>
      <textarea
        id="address"
        name="student_address"
        placeholder="Enter full address"
        required
      ></textarea>
    </div>

    <button type="submit" class="submit-btn">Save Student Information</button>
  </form>
</div>
{% endblock blockname %}
